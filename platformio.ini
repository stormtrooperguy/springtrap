[platformio]
default_envs = esp32dev

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_eol = LF

[env:esp32dev]
lib_deps =
    fastled/FastLED @ ^3.6.0
    madhephaestus/ESP32Servo @ ^0.13.0
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

; Standalone bench tool for finding mouth servo angles/timing — see
; tools/mouth_tune/main.cpp. Builds that file instead of src/main.cpp.
[env:mouth_tune]
lib_deps =
    madhephaestus/ESP32Servo @ ^0.13.0
build_src_filter =
    +<*>
    -<main.cpp>
    +<../tools/mouth_tune/main.cpp>
